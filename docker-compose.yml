# docker-compose.yml
# Development services for Bandanaiera Admin
# Runs PostgreSQL and MinIO - App runs on host machine for development

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bandanaiera-postgres
    restart: unless-stopped
    ports:
      - "7432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bandanaiera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bandanaiera123}
      POSTGRES_DB: ${POSTGRES_DB:-bandanaiera_admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bandanaiera}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - support-network

  # minio:
  #   image: minio/minio:latest
  #   container_name: bandanaiera-minio
  #   restart: unless-stopped
